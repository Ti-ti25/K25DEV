<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | K25 DEV</title>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { max-width: 1100px; margin: 0 auto; padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; color: #58a6ff; text-decoration: none;}
        nav a { color: #9ca3af; text-decoration: none; margin-left: 20px; }
        .container { max-width: 500px; margin: 60px auto; padding: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        h2 { text-align: center; margin-top: 0; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #0b0f19; border: 1px solid #30363d; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1f6feb; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:hover { background: #388bfd; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">K25 DEV</a>
        <nav><a href="/">Accueil</a><a href="/contact">Contact</a></nav>
    </header>
    <div class="container">
        <h2>Discutons de votre projet</h2>
        <form action="#" method="POST">
            <input type="text" placeholder="Votre Nom / Entreprise" required>
            <input type="email" placeholder="Votre Adresse Email" required>
            <textarea rows="5" placeholder="Décrivez votre besoin (Site web, bot Discord, script Python...)" required></textarea>
            <button type="submit">Envoyer la demande</button>
        </form>
    </div>
</body>
</html>
