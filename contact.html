<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | K25 DEV</title>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; margin: 0; padding: 20px; }
        header { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; padding: 20px 0; }
        .logo { font-size: 24px; font-weight: bold; color: #58a6ff; text-decoration: none; }
        nav a { color: #9ca3af; text-decoration: none; margin-left: 20px; }
        
        .container { max-width: 900px; margin: 40px auto; }
        h1 { text-align: center; }
        
        .contact-grid { display: flex; gap: 20px; margin-top: 40px; }
        .box { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 25px; }
        
        /* Discord */
        .box-discord { text-align: center; border-color: #5865f2; }
        .btn-discord { display: inline-block; background: #5865f2; color: white; padding: 12px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        
        /* Formulaire */
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; background: #0b0f19; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1f6feb; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #388bfd; }

        @media (max-width: 768px) { .contact-grid { flex-direction: column; } }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">K25 DEV</a>
        <nav>
            <a href="/">Accueil</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h1>Lancez votre projet avec K25 DEV</h1>
        
        <div class="contact-grid">
            
            <!-- CODE DISCORD SIMPLE -->
            <div class="box box-discord">
                <h2>Option 1 : Discord</h2>
                <p>Rejoignez notre serveur pour ouvrir un ticket et échanger en direct avec nous. C'est le plus rapide !</p>
                <!-- METS TON LIEN DISCORD CI-DESSOUS -->
                <a href="https://discord.gg/TON_INVITATION" target="_blank" class="btn-discord">Rejoindre le Discord</a>
            </div>
            
            <!-- CODE FORMSPREE SIMPLE -->
            <div class="box">
                <h2>Option 2 : Par Email</h2>
                <!-- METS TON LIEN FORMSPREE CI-DESSOUS -->
                <form action="https://formspree.io/f/TON_CODE_FORMSPREE" method="POST">
                    
                    <input type="text" name="Nom" placeholder="Votre Nom / Pseudo" required>
                    <input type="email" name="Email" placeholder="Votre Adresse Email" required>
                    
                    <select name="Service" required>
                        <option value="" disabled selected>Quel service vous intéresse ?</option>
                        <option value="Python">Python & Données</option>
                        <option value="Scraping">Extraction Web (Scraping)</option>
                        <option value="Web">Bugs HTML / CSS</option>
                        <option value="Discord">Serveur Discord Pro</option>
                    </select>
                    
                    <textarea name="Message" rows="4" placeholder="Détails de votre projet..." required></textarea>
                    
                    <button type="submit">Envoyer le message</button>
                </form>
            </div>
            
        </div>
    </div>

</body>
</html>
